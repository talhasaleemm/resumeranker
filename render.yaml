# =========================================================
# render.yaml — ResumeRanker Phase 16 Blueprint
# Deploys: Web Service (FastAPI) + Private PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
# =========================================================

services:
  - type: web
    name: resumeranker-api
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    # Run migrations before serving traffic; swap async driver for SQLAlchemy
    dockerCommand: >
      sh -c "
        export DATABASE_URL=$${DATABASE_URL/postgresql:/postgresql+asyncpg:} &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port $${PORT:-8000}
      "
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: TFIDF_WEIGHT
        value: "0.4"
      - key: BM25_WEIGHT
        value: "0.4"
      - key: SKILL_WEIGHT
        value: "0.2"
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: RATE_LIMIT_REQUESTS
        value: "20"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      # Render injects the internal Postgres URL; never commit real secrets
      - key: DATABASE_URL
        fromDatabase:
          name: resumeranker-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: resumeranker-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: resumeranker-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: resumeranker-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: resumeranker-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: resumeranker-db
          property: password
      # Set in Render Dashboard (sync: false keeps secrets out of git)
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: BLIND_INDEX_KEY
        sync: false

databases:
  - name: resumeranker-db
    plan: starter
    region: oregon
    databaseName: resumeranker
    user: resumeranker
    # Private service — reachable only from resumeranker-api on Render's private network
