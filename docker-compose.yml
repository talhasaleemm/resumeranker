# =========================================================
# docker-compose.yml — ResumeRanker Phase 16 (local stack)
# Services: FastAPI app + PostgreSQL only
# =========================================================
services:
  db:
    # pgvector-enabled PostgreSQL 16 (provides the `vector` extension library
    # required by the jobs/candidates embedding columns).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumeranker}
      POSTGRES_USER: ${POSTGRES_USER:-resumeranker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    volumes:
      # Named volume survives `docker compose down` for durable local data
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumeranker} -d ${POSTGRES_DB:-resumeranker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - resumeranker_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SPACY_MODEL: ${SPACY_MODEL:-en_core_web_sm}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override host/port for in-network PostgreSQL service discovery
      POSTGRES_HOST: db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resumeranker}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-resumeranker}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${APP_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Hot-reload source in dev; remove bind mounts in production images
      - ./app:/app/app
      - ./alembic.ini:/app/alembic.ini
      - ./app/migrations:/app/app/migrations
      - ./data:/app/data
    command: >
      sh -c "
        echo '--- Running Alembic migrations ---' &&
        alembic upgrade head &&
        echo '--- Starting FastAPI server ---' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - resumeranker_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - resumeranker_net

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SPACY_MODEL: ${SPACY_MODEL:-en_core_web_sm}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resumeranker}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-resumeranker}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: >
      sh -c "celery -A app.worker.celery_app worker --loglevel=info --concurrency=2"
    healthcheck:
      # Celery worker reports status via the inspect ping control command.
      # Use CMD-SHELL so the destination glob is expanded by the shell.
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping -d celery@*"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - resumeranker_net

volumes:
  postgres_data:
    driver: local

networks:
  resumeranker_net:
    driver: bridge
