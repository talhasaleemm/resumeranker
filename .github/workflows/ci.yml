name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: resumeranker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: devpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d resumeranker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: resumeranker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword123
      DATABASE_URL: postgresql+asyncpg://postgres:devpassword123@127.0.0.1:5432/resumeranker
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      BLIND_INDEX_KEY: ${{ secrets.BLIND_INDEX_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libmagic1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Run Alembic migrations
      run: alembic upgrade head

    - name: Run tests with pytest
      run: pytest tests/ -v --timeout=60

    - name: Run pip-audit
      run: |
        pip install pip-audit
        python -m pip_audit --desc on -r requirements.txt
      continue-on-error: true
